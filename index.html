<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>일일 카페인 한도 계산기</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: #f7f3f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .calculator-container {
      background-color: #ffffff;
      padding: 40px 30px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(111, 78, 55, 0.08);
      width: 100%;
      max-width: 400px;
    }

    .header { text-align: center; margin-bottom: 30px; }
    .header h2 { color: #4a3324; margin: 0 0 10px 0; font-size: 24px; font-weight: 700; }
    .header p { color: #8c7b70; margin: 0; font-size: 15px; }

    .input-group { margin-bottom: 20px; text-align: left; }
    .input-group label { display: block; margin-bottom: 8px; color: #5a4b41; font-weight: 600; font-size: 14px; }

    select, input {
      width: 100%; padding: 14px 16px; border: 1.5px solid #e2ddd9;
      border-radius: 12px; box-sizing: border-box; font-size: 16px;
      color: #333; background-color: #faf9f8; font-family: inherit;
    }

    select:focus, input:focus { outline: none; border-color: #6f4e37; box-shadow: 0 0 0 3px rgba(111, 78, 55, 0.1); }

    .calc-btn {
      background-color: #6f4e37; color: white; border: none; padding: 16px;
      width: 100%; border-radius: 12px; font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 10px; font-family: inherit;
    }
    .calc-btn:hover { background-color: #5a3f2c; }

    .result-area {
      margin-top: 24px; padding: 20px; background-color: #fcf9f7;
      border: 1px dashed #dcbca3; border-radius: 12px; font-size: 15px;
      text-align: center; color: #4a3324; line-height: 1.5;
    }
    .result-area strong { display: block; font-size: 26px; color: #d9534f; margin-top: 8px; font-weight: 800; }

    .footer-info { font-size: 12px; color: #a3958c; margin-top: 24px; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>

  <div class="calculator-container">
    <div class="header">
      <h2>☕ 카페인 한도 계산기</h2>
      <p>나에게 맞는 안전한 섭취량은?</p>
    </div>
    
    <div class="input-group">
      <label for="userType">사용자 연령대</label>
      <select id="userType" onchange="toggleWeightInput()">
        <option value="adult">성인</option>
        <option value="youth">어린이 및 청소년</option>
      </select>
    </div>

    <div class="input-group" id="weightGroup" style="display: none;">
      <label for="weight">몸무게 (kg)</label>
      <input type="number" id="weight" placeholder="몸무게를 입력하세요">
    </div>

    <button class="calc-btn" onclick="calculateCaffeine()">내 한도 확인하기</button>

    <div class="result-area" id="resultText">
      결과가 여기에 표시됩니다.
    </div>

    <div class="footer-info">
      * 한국 식약처 권고 기준에 따름<br>
        참고: 아메리카노 1잔, 몬스터 에너지 드링크 1캔 = 약 150mg<br>
             커피우유 1개 = 237mg
    </div>
  </div>

  <script>
    function toggleWeightInput() {
      const type = document.getElementById('userType').value;
      const weightGroup = document.getElementById('weightGroup');
      const weightInput = document.getElementById('weight');
      const resultText = document.getElementById('resultText');
      
      resultText.innerHTML = "결과가 여기에 표시됩니다.";

      if (type === 'youth') {
        weightGroup.style.display = 'block';
        weightInput.focus();
      } else {
        weightGroup.style.display = 'none';
        weightInput.value = '';
      }
    }

    function calculateCaffeine() {
      const type = document.getElementById('userType').value;
      const weight = document.getElementById('weight').value;
      const resultText = document.getElementById('resultText');
      let limit = 0;

      if (type === 'adult') {
        limit = 400;
      } else if (type === 'youth') {
        if (!weight || weight <= 0) {
          resultText.innerHTML = "<span style='color: #d9534f; font-weight: bold;'>올바른 몸무게를 입력해주세요!</span>";
          return;
        }
        limit = (weight * 2.5).toFixed(1);
      }

      resultText.innerHTML = `권장 하루 최대 섭취량 <strong>${limit} mg</strong>`;
    }
  </script>

</body>
</html>
